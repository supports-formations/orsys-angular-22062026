@if(destination) {
    {{ destination.title }}

    <ul>
        @for (step of destination.steps; track step.id) {
        <!-- <li *ngFor="let step of destination.steps"> -->
        <li>
            {{ step | stepToString | uppercase }}

            @for (place of step.place; track place.id) {
                <orsys-display-culinary-stop-list />
            }
        </li>
        }
    </ul>

    <orsys-display-friends />
}
